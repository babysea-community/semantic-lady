include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/SAST-IaC.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Code-Quality.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

stages:
  - verify
  - test
  - build
  - security

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "external_pull_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

variables:
  GIT_DEPTH: '0'
  AST_ENABLE_MR_PIPELINES: 'true'
  GITLAB_ADVANCED_SAST_ENABLED: 'true'
  SECURE_LOG_LEVEL: warn
  SAST_EXCLUDED_PATHS: '.cache,.npm,.pnpm-store,coverage,dist,build,node_modules,*.egg-info,.pytest_cache,.ruff_cache'
  DS_EXCLUDED_PATHS: '.cache,.npm,.pnpm-store,coverage,dist,build,node_modules,*.egg-info,.pytest_cache,.ruff_cache'
  SECRET_DETECTION_EXCLUDED_PATHS: '.cache,.npm,.pnpm-store,coverage,dist,build,node_modules,*.egg-info,.pytest_cache,.ruff_cache'
  SECRET_DETECTION_HISTORIC_SCAN: 'true'
  CONTAINER_SCANNING_DISABLED: 'false'
  CS_DISABLE_DEPENDENCY_LIST: 'false'
  JS_PACKAGE_DIR: ''
  PYTHON_PACKAGE_DIR: ''
  PNPM_VERSION: '11.7.0'
  PNPM_INSTALL_FLAGS: --ignore-scripts
  NPM_CI_FLAGS: --ignore-scripts
  PIP_INSTALL_EXTRAS: '.[dev]'

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

container_scanning:
  stage: security
  allow_failure: true
  rules:
    - if: '$CONTAINER_SCANNING_DISABLED == "true" || $CONTAINER_SCANNING_DISABLED == "1"'
      when: never
    - if: '$CS_IMAGE'
    - when: never

code_quality:
  allow_failure: true

gemnasium-dependency_scanning:
  allow_failure: true

gitlab-advanced-sast:
  allow_failure: true

kics-iac-sast:
  allow_failure: true

secret_detection:
  allow_failure: true

.javascript-job:
  image: node:24-bookworm
  cache:
    key: javascript-${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
      - .pnpm-store/
      - client/typescript/.npm/
  before_script:
    - |
      set -eu
      js_dir="${JS_PACKAGE_DIR:-}"
      if [ -z "$js_dir" ]; then
        if [ -f package.json ]; then
          js_dir="."
        elif [ -f client/typescript/package.json ]; then
          js_dir="client/typescript"
        fi
      fi

      if [ -z "$js_dir" ]; then
        echo 'JS_SKIP=1' > .ci-js.env
        echo 'No JavaScript/TypeScript package found; skipping JS job.'
        exit 0
      fi

      if [ ! -f "$js_dir/package.json" ]; then
        echo "Configured JS_PACKAGE_DIR=$js_dir does not contain package.json" >&2
        exit 1
      fi

      case "$js_dir" in
        /*) js_abs_dir="$js_dir" ;;
        *) js_abs_dir="$CI_PROJECT_DIR/$js_dir" ;;
      esac

      echo 'JS_SKIP=0' > .ci-js.env
      echo "JS_DIR=$js_dir" >> .ci-js.env
      echo "JS_ABS_DIR=$js_abs_dir" >> .ci-js.env
      cd "$js_abs_dir"

      if [ -f pnpm-lock.yaml ]; then
        corepack enable
        corepack prepare "pnpm@$PNPM_VERSION" --activate
        pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
        pnpm install --frozen-lockfile $PNPM_INSTALL_FLAGS
        echo 'JS_PM=pnpm' >> "$CI_PROJECT_DIR/.ci-js.env"
      elif [ -f package-lock.json ]; then
        npm ci --cache "$CI_PROJECT_DIR/.npm" --prefer-offline $NPM_CI_FLAGS
        echo 'JS_PM=npm' >> "$CI_PROJECT_DIR/.ci-js.env"
      else
        corepack enable
        corepack prepare "pnpm@$PNPM_VERSION" --activate
        pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"
        pnpm install $PNPM_INSTALL_FLAGS
        echo 'JS_PM=pnpm' >> "$CI_PROJECT_DIR/.ci-js.env"
      fi

      cd "$CI_PROJECT_DIR"

.python-job:
  image: python:3.12-bookworm
  cache:
    key: python-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip/
      - client/python/.cache/pip/
  variables:
    PIP_CACHE_DIR: .cache/pip
  before_script:
    - |
      set -eu
      python_dir="${PYTHON_PACKAGE_DIR:-}"
      if [ -z "$python_dir" ]; then
        if [ -f client/python/pyproject.toml ] || [ -f client/python/requirements.txt ] || [ -f client/python/requirements-dev.txt ]; then
          python_dir="client/python"
        elif [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f requirements-dev.txt ]; then
          python_dir="."
        fi
      fi

      if [ -z "$python_dir" ]; then
        echo 'PYTHON_SKIP=1' > .ci-python.env
        echo 'No Python package found; skipping Python job.'
        exit 0
      fi

      case "$python_dir" in
        /*) python_abs_dir="$python_dir" ;;
        *) python_abs_dir="$CI_PROJECT_DIR/$python_dir" ;;
      esac

      echo 'PYTHON_SKIP=0' > .ci-python.env
      echo "PYTHON_DIR=$python_dir" >> .ci-python.env
      echo "PYTHON_ABS_DIR=$python_abs_dir" >> .ci-python.env
      cd "$python_abs_dir"
      python -m pip install --upgrade pip

      if [ -f pyproject.toml ]; then
        python -m pip install -e "$PIP_INSTALL_EXTRAS" || python -m pip install -e .
      elif [ -f requirements-dev.txt ]; then
        python -m pip install -r requirements-dev.txt
      elif [ -f requirements.txt ]; then
        python -m pip install -r requirements.txt
      fi

      cd "$CI_PROJECT_DIR"

verify:metadata:
  stage: verify
  image: node:24-bookworm
  timeout: 10m
  script:
    - test -f README.md
    - test -f LICENSE
    - test -f CHANGELOG.md || echo 'CHANGELOG.md not found; add one before publishing a public release.'
    - |
      set -eu
      pkg_path=''
      if [ -f package.json ]; then
        pkg_path='package.json'
      elif [ -f client/typescript/package.json ]; then
        pkg_path='client/typescript/package.json'
      fi
      if [ -n "$pkg_path" ]; then
        node -e "const pkg=require('./' + process.argv[1]); if (!pkg.name) throw new Error('package name is required'); if (!pkg.version) throw new Error('package version is required'); console.log(pkg.name + '@' + pkg.version);" "$pkg_path"
      else
        echo 'No package.json found; metadata package check skipped.'
      fi

verify:javascript:
  stage: verify
  extends: .javascript-job
  timeout: 10m
  script:
    - |
      set -eu
      . "$CI_PROJECT_DIR/.ci-js.env"
      if [ "${JS_SKIP:-0}" = '1' ]; then exit 0; fi
      cd "$JS_ABS_DIR"
      for script_name in format lint typecheck check; do
        if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.[process.argv[1]] ? 0 : 1)" "$script_name"; then
          "$JS_PM" run "$script_name"
        else
          echo "No $script_name script; skipping."
        fi
      done

verify:python:
  stage: verify
  extends: .python-job
  timeout: 10m
  script:
    - |
      set -eu
      . "$CI_PROJECT_DIR/.ci-python.env"
      if [ "${PYTHON_SKIP:-0}" = '1' ]; then exit 0; fi
      cd "$PYTHON_ABS_DIR"
      python -m compileall .
      if python -c 'import ruff' >/dev/null 2>&1; then python -m ruff check .; else echo 'ruff is not installed; skipping.'; fi
      if python -c 'import pyright' >/dev/null 2>&1; then python -m pyright; else echo 'pyright is not installed; skipping.'; fi

test:javascript:
  stage: test
  extends: .javascript-job
  timeout: 15m
  coverage: '/All files[^|]*\|[^|]*\s+([0-9.]+)/'
  script:
    - |
      set -eu
      . "$CI_PROJECT_DIR/.ci-js.env"
      mkdir -p coverage
      if [ "${JS_SKIP:-0}" = '1' ]; then exit 0; fi
      cd "$JS_ABS_DIR"
      if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.['test:coverage'] ? 0 : 1)"; then
        "$JS_PM" run test:coverage
      elif node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.test ? 0 : 1)"; then
        "$JS_PM" test
      else
        echo 'No test or test:coverage script; skipping.'
      fi
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - coverage/
      - client/typescript/coverage/

test:python:
  stage: test
  extends: .python-job
  timeout: 15m
  script:
    - |
      set -eu
      . "$CI_PROJECT_DIR/.ci-python.env"
      if [ "${PYTHON_SKIP:-0}" = '1' ]; then exit 0; fi
      cd "$PYTHON_ABS_DIR"
      test_dir=''
      for candidate in tests test tests/python ../tests/python ../../tests/python; do
        if [ -d "$candidate" ]; then test_dir="$candidate"; break; fi
      done
      if [ -z "$test_dir" ]; then echo 'No Python tests directory found; skipping.'; exit 0; fi
      if python -c 'import pytest' >/dev/null 2>&1; then python -m pytest "$test_dir"; else echo 'pytest is not installed; skipping.'; fi

build:javascript:
  stage: build
  extends: .javascript-job
  timeout: 15m
  script:
    - |
      set -eu
      . "$CI_PROJECT_DIR/.ci-js.env"
      if [ "${JS_SKIP:-0}" = '1' ]; then exit 0; fi
      cd "$JS_ABS_DIR"
      if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.build ? 0 : 1)"; then "$JS_PM" run build; else echo 'No build script; skipping.'; fi
      if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.['exports:check'] ? 0 : 1)"; then "$JS_PM" run exports:check; else echo 'No exports:check script; skipping.'; fi
      if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.['pack:dry-run'] ? 0 : 1)"; then "$JS_PM" run pack:dry-run; elif [ -f package.json ]; then npm pack --dry-run; fi

build:python:
  stage: build
  extends: .python-job
  timeout: 15m
  script:
    - |
      set -eu
      . "$CI_PROJECT_DIR/.ci-python.env"
      if [ "${PYTHON_SKIP:-0}" = '1' ]; then exit 0; fi
      cd "$PYTHON_ABS_DIR"
      if [ ! -f pyproject.toml ]; then echo 'No pyproject.toml; skipping Python package build.'; exit 0; fi
      python -m pip install build
      python -m build --sdist --wheel

dependency:audit:javascript:
  stage: security
  extends: .javascript-job
  allow_failure: true
  timeout: 10m
  needs: []
  script:
    - |
      set -eu
      . "$CI_PROJECT_DIR/.ci-js.env"
      if [ "${JS_SKIP:-0}" = '1' ]; then exit 0; fi
      cd "$JS_ABS_DIR"
      if [ "$JS_PM" = 'pnpm' ]; then pnpm audit --prod --audit-level=high; else npm audit --omit=dev --audit-level=high; fi

secret:scan:
  stage: security
  image:
    name: zricethezav/gitleaks:v8.28.0
    entrypoint: ['']
  allow_failure: true
  timeout: 5m
  needs: []
  script:
    - gitleaks detect --source . --no-banner --redact
